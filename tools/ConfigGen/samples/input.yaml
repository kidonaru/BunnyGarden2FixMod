- section: Resolution
  configs:
    - name: Width
      type: int
      default: 1920
      description: 解像度の幅（横）を指定します

    - name: ExtraWidth
      type: int
      default: 2560
      description: |
        ゲーム内 OptionMenu の DISPLAY 項目に追加される拡張解像度（ウィンドウモード）の幅。
        既定 2560（WQHD）。16:9 を推奨。

- section: Display
  configs:
    - name: FrameRate
      type: int
      default: 60
      range: [30, 240]
      description: フレームレート上限

- section: Hotkey
  configs:
    - name: TimeStopToggleKey
      type: enum
      enumType: UnityEngine.InputSystem.Key
      default: F8
      description: 時間停止のトグルキー

    - name: SampleHotkey
      key: Sample
      type: hotkey
      defaultKey: F12
      defaultButton: Start
      description: |
        サンプルホットキー。
        コントローラーの場合は ControllerModifier と同時押しが必要です。

- section: Sample
  configs:
    - name: SampleToggle
      type: bool
      default: false
      description: テスト用 Toggle
      ui:
        kind: toggle
        label: テスト Toggle
        category: Sample
        order: 10

    - name: SampleSlider
      type: float
      default: 0.5
      range: [0.0, 1.0]
      description: テスト用 Slider
      ui:
        kind: slider
        label: テスト Slider
        category: Sample
        order: 20
        step: 0.1
        format: '{0:F2}'
