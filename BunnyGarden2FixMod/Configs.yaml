# Master declaration for all BepInEx Config entries used by FixMod.
# Source of truth — Generated/Configs.g.cs is built from this by tools/ConfigGen.
# Phase 1: section/key/default は既存 .cfg と完全一致を厳守する。
# upstream PR #25 (Refactor Plugin) で section/key が再編成されたため整合済み。
# label は必須・name 直下。生成コードの XML doc コメントと .cfg description の 1 行目に使われる。
# description は label の補足として書く（label と重複する見出し的記述は避ける）。
# type=hotkey は controllerDescription を任意指定でき、Gamepad エントリのみに追記される。

- section: Graphics
  name: 解像度・フレームレート・グラフィック
  configs:
    - name: Width
      label: 解像度幅
      type: int
      default: 1920
      description: 16:9 以外の値を指定すると自動的に最大 16:9 に変換されます。

    - name: Height
      label: 解像度高さ
      type: int
      default: 1080
      description: 16:9 以外の値を指定すると自動的に最大 16:9 に変換されます。

    - name: ExtraWidth
      label: 拡張解像度幅
      type: int
      default: 2560
      description: |
        ゲーム内 OptionMenu の DISPLAY 項目に追加される追加解像度（ウィンドウモード）。既定 2560×1440（WQHD）。
        16:9 以外の値は自動的に最大 16:9 に変換されます。

    - name: ExtraHeight
      label: 拡張解像度高さ
      type: int
      default: 1440
      description: 16:9 以外の値は自動的に最大 16:9 に変換されます。

    - name: FrameRate
      label: FPS 上限
      type: int
      default: 60
      range: [0, 1000]
      description: 0 で上限を撤廃します。
      ui:
        kind: slider
        step: 1
        format: '{0} fps'

    - name: ForceVSync
      label: VSync を強制 ON
      type: bool
      default: false
      description: |
        QualitySettings.vSyncCount = 1 を強制します。
        フレームレートがモニターのリフレッシュレートに同期され、ティアリングが防止されます。
        有効時は FrameRate 設定より VSync が優先されます。
      ui:
        kind: toggle

    - name: ForceExclusiveFullScreen
      label: 排他的フルスクリーンを強制
      type: bool
      default: false
      description: |
        Windows DWM をバイパスし、複数モニター接続時の FPS 低下が改善される場合があります。
        ウィンドウモード (1080p / 720p) では無効です。
        Alt+Tab でのウィンドウ切り替え時に画面が一瞬暗転する場合があります。
      ui:
        kind: toggle

    - name: AntiAliasing
      label: アンチエイリアシング
      key: AntiAliasingType
      type: enum
      enumType: BunnyGarden2FixMod.AntiAliasingType
      default: MSAA8x
      description: |
        Off / FXAA / TAA / MSAA2x / MSAA4x / MSAA8x。
        右にいくほど画質が向上しますが動作が重くなります。
      ui:
        kind: dropdown

    - name: DisableChromaticAberration
      label: 色収差(画面端のにじみ)を無効化
      type: bool
      default: false
      ui:
        kind: toggle

    - name: DisableDepthOfField
      label: 被写界深度(画面の一部がぼやける効果)を無効化
      type: bool
      default: false
      ui:
        kind: toggle

    - name: FullscreenUltrawideEnabled
      label: フルスクリーンでウルトラワイド比率を使う
      type: bool
      default: false
      description: |
        ゲームプレイ中のみモニターのネイティブ比率で表示します。
        タイトル画面やメニュー画面は従来どおり 16:9 のままです。
      ui:
        kind: toggle

- section: Internal
  hidden: true
  configs:
    - name: ExtraActive
      label: 拡張解像度の使用状態（内部）
      type: bool
      default: false
      description: |
        【内部状態】OptionMenu で拡張解像度 (ExtraWidth×ExtraHeight) を選択中かを記録します。
        ゲーム内オプション操作時に自動更新されます。手動変更しないでください。

- section: Camera
  name: フリーカメラ
  footer: |
    フリーカメラは **F5** キーで ON/OFF、**F6** キーでカメラ固定のトグルができます。
    コントローラーの既定操作は **Select + Y** で ON/OFF、フリーカメラ中は **Select + X** で固定切り替え、**Select + B** で時間停止、**Select + A** でスクリーンショット保存です。
    オーバーレイ表示は **F12** または **Select + Start** で表示／非表示を切り替えられます。

    #### フリーカメラ操作

    | 入力 | 動作 |
    |------|------|
    | **WASD / 矢印キー** | 前後左右に移動 |
    | **Q / E** | 上下に移動 |
    | **Shift / Ctrl** | 高速移動 / 低速移動 |
    | **マウス** | 視点移動 |
    | **T** | 時間停止 ON / OFF |
    | **F** | 時間停止中に 1 フレーム進める |
    | **G** | 押している間だけ早送り（ホールド） |
    | **P** | スクリーンショットを PNG 保存（ゲーム UI・オーバーレイなし） |
    | **F12** | オーバーレイ表示 ON / OFF |
    | **左スティック** | 前後左右に移動 |
    | **右スティック** | 視点移動 |
    | **ZL / ZR** | 下 / 上に移動 |
    | **L / R** | 低速移動 / 高速移動 |
    | **Select + X** | 固定モード ON / OFF |
    | **Select + B** | 時間停止 ON / OFF |
    | **Select + A** | スクリーンショットを PNG 保存 |
    | **Select + Start** | オーバーレイ表示 ON / OFF |

    > **注意**: フリーカメラ中は誤操作を避けるため、既定ではゲーム本体の UI を自動で隠します。終了確認や確認ダイアログが表示された場合は、自動的に UI が復帰し、終了確認ではフリーカメラも自動解除されます。固定モード中は時間停止を有効化できません。スクリーンショットは `BepInEx/screenshots/net.noeleve.BunnyGarden2FixMod/` に PNG で保存されます。
  configs:
    - name: Sensitivity
      label: フリーカメラのマウス感度
      type: float
      default: 10
      range: [0.05, 30.0]
      ui:
        kind: slider
        step: 0.05
        format: '{0:F2}'

    - name: Speed
      label: フリーカメラの基本移動速度
      type: float
      default: 2.5
      range: [0.5, 10.0]
      ui:
        kind: slider
        step: 0.1
        format: '{0:F2}'

    - name: FastSpeed
      label: フリーカメラの高速移動速度 (Shift 押下中)
      type: float
      default: 20
      range: [2.0, 60.0]
      ui:
        kind: slider
        step: 0.5
        format: '{0:F1}'

    - name: SlowSpeed
      label: フリーカメラの低速移動速度 (Ctrl 押下中)
      type: float
      default: 0.5
      range: [0.05, 2.0]
      ui:
        kind: slider
        step: 0.05
        format: '{0:F2}'

    - name: HideGameUiInFreeCam
      label: フリーカメラ起動中にゲーム本体の Canvas を非表示
      type: bool
      default: true
      ui:
        kind: toggle

    - name: ControllerEnabled
      label: フリーカメラ操作にゲームパッド入力を使用
      type: bool
      default: true
      ui:
        kind: toggle

- section: Animation
  name: アニメーション
  configs:
    - name: MoreTalkReactions
      label: バーの背景キャスト 2 人の会話リアクションモーションを多様化
      type: bool
      default: false
      ui:
        kind: toggle

    - name: FixAnimationClipping
      label: 一部モーションでスカートが体にめり込む現象を補正
      type: bool
      default: true
      ui:
        kind: toggle

- section: Cheki
  name: チェキ高解像度保存
  configs:
    - name: ChekiHighResEnabled
      label: 高解像度チェキを有効化
      key: HighResEnabled
      type: bool
      default: false
      description: |
        チェキ（撮影写真）の保存解像度を Size で指定した値に変更します。false で本体既定（320x320）。
        互換性: 本体セーブには常に 320x320 版が保存されるため、MOD を外しても主セーブは破損しません。
        高解像度版は MOD 独自のサイドカーファイル（主セーブ + .exmod）に格納します。
        保存先は `BepInEx/data/net.noeleve.BunnyGarden2FixMod/`（Steam Cloud Save 対象外）。
        PC 移行時はこのフォルダを手動でコピーしてください。
        スロット対応: セーブスロット単位で高解像度データを分離管理します。
        副作用: 高解像度化でメモリ／セーブサイズが増加します（1024 時: 約 48MB/12 枚）。
      ui:
        kind: toggle

    - name: ChekiSize
      label: チェキ解像度
      key: Size
      type: int
      default: 1024
      range: [64, 2048]
      description: |
        正方形サイズ（ピクセル）。HighResEnabled が false の場合は無視されます（本体既定の 320 が使用されます）。
        PNG で実測 1〜5MB/枚 程度に収まります。
      ui:
        kind: slider
        step: 64
        format: '{0} px'

    - name: ChekiFormat
      label: チェキ画像フォーマット
      key: ImageFormat
      type: enum
      enumType: BunnyGarden2FixMod.ChekiImageFormat
      default: PNG
      description: |
        PNG : 無劣化圧縮。サイズ 1/5〜1/20・エンコード 50〜200ms/枚。既定。
        JPG : 劣化圧縮。サイズ 1/20〜1/50・エンコード 30〜100ms/枚。
        エンコードはシャッター時に 1 度のみ走ります。読み込みは magic byte による自動判別です。
      ui:
        kind: dropdown

    - name: ChekiJpgQuality
      label: JPG 品質
      key: JpgQuality
      type: int
      default: 90
      range: [1, 100]
      description: ImageFormat=JPG のときの品質（1〜100）。値が小さいほどサイズは小さく画質は粗くなります。
      ui:
        kind: slider
        step: 1
        format: '{0}'

    - name: EndingChekiSlideshow
      label: エンディング中に撮影済みのチェキをスライドショー表示
      key: ChekiSlideshow
      type: bool
      default: true
      ui:
        kind: toggle

- section: Cheat
  name: チート
  footer: |
    #### キャスト出勤順変更の操作方法

    config で `CastOrder = true` にした上で、ホール画面（バーに入る前）で操作します。

    | キー | 動作 |
    |------|------|
    | **F1** | 編集モード 開始 / 終了 |
    | **W / ↑** | 選択を上に移動 |
    | **S / ↓** | 選択を下に移動 |
    | **1〜6** キー（1回目） | そのキャストを選択（黄色表示） |
    | **1〜6** キー（2回目） | 選択中のキャストと入れ替え |
    | **Esc** | 編集モードを終了 |

    - 画面右上にキャストの現在の並び順が表示されます
    - パネル下部の「**順番を固定する**」チェックボックスをクリックすると、`UpdateTodaysCastOrder` による自動並び替えを無効化できます（固定中は数字キーでの入れ替えも無効）
    - バーに入店した後は変更できません（自動的に編集モードが終了します）
    - 日付が変わった場合も自動的に編集モードが終了します
  configs:
    - name: CastOrder
      label: キャスト出勤順序変更（バー入店前に F1 で編集）
      type: bool
      default: false
      description: F1 で編集モードを開始し、数字キー（1〜5）でキャストを選択・入れ替えます。
      ui:
        kind: toggle

    - name: UltimateSurvivorEnabled
      label: 鉄骨渡りミニゲームで落下しなくなる（チート）
      key: UltimateSurvivor
      type: bool
      default: false
      ui:
        kind: toggle

    - name: GambleAlwaysWinEnabled
      label: ギャンブルで負けなくなる（チート）
      key: GambleAlwaysWin
      type: bool
      default: false
      ui:
        kind: toggle

    - name: CheatLikability
      label: 好感度ヒント表示
      key: Likability
      type: bool
      default: false
      description: |
        会話選択肢・ドリンク・フードの正解をゲーム内に表示します。
        【会話選択肢】選択肢テキストの先頭に記号が追加されます。
          ★ : 好感度UP（正解）
          ▼ : 好感度DOWN（酔い選択肢だが現在の状況では効果なし）
        【ドリンク・フード】アイテムの背景色が変化します。
          緑 : キャストのお気に入り（AddFavoriteLikability > 0）
          黄 : 今日の旬アイテム（ボーナスあり）
          赤 : キャストが嫌いなもの（AddFavoriteLikability < 0）
      ui:
        kind: toggle

- section: CostumeChanger
  name: 衣装変更
  header: |
    F7 キー（既定）で Wardrobe パネルを開き、表示中のキャストの衣装・パンツ・ストッキングを自由に切り替えることができます。DLC 衣装にも対応しています。
  footer: |
    #### 操作方法

    Wardrobe パネル表示中、以下のキーで操作できます。

    | キー | 動作 |
    |------|------|
    | **A / ←** | 左のタブに切替 |
    | **D / →** | 右のタブに切替 |
    | **W / ↑** | 選択を上に移動 |
    | **S / ↓** | 選択を下に移動 |
    | **Enter** | 選択したアイテムを適用（既に適用中なら解除） |
    | **R** | 全タブの override をリセット |
    | **Esc** | パネルを閉じる |
    | **マウスクリック** | 行をクリックで即適用・解除。キャスト名をクリックで対象切替 |

    - パネル上のカーソル外にある操作はゲームに素通しされます
    - フィッティングルーム動作中はパネルを開けません
    - 複数のキャストが画面に表示されている場合は、パネル上のキャスト名をクリックして対象を切り替えられます
  configs:
    - name: CostumeChangerEnabled
      label: 衣装変更を有効化（要再起動）
      key: Enabled
      type: bool
      default: true
      description: |
        衣装変更 UI とパッチを有効化します。
        OFF→ON でパッチ適用が必要なため、変更は再起動後に反映されます。
      ui:
        kind: toggle

    - name: RespectGameCostumeOverride
      label: ゲーム指定衣装を優先
      type: bool
      default: true
      description: |
        試着室などゲームが特定の衣装を強制するシーンでは MOD 側の衣装変更を一時停止します。
        ゲーム内のイベントと衣装の競合を防げます。
      ui:
        kind: toggle

    - name: SwimWearStocking
      label: 水着+ストッキング適用
      type: bool
      default: true
      description: |
        水着コスチューム着用中にストッキングを適用できるようにします。
        水着モデルには本来ストッキング用ブレンドシェイプがないため、同キャラの Uniform コスチュームからデータを移植します。

    - name: StockingOffset
      label: ストッキング 押出し量 (m)
      type: float
      default: 0
      range: [0, 0.01]
      description: |
        水着+ストッキング適用時、stocking 頂点を肌より外側へ保つ最小距離（メートル）。
        押し出すと水着の食い込み（タイトな演出）が再現できますが、stocking が水着を貫通します。
        0 で無効化。デフォルト 0 (無効)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: StockingSkinShrink
      label: 肌 押込み量 (m)
      type: float
      default: 0.001
      range: [0, 0.01]
      description: |
        水着+ストッキング適用時、肌（mesh_skin_lower）の頂点を「stocking 押し出し後表面より内側」に
        保つ目標距離（メートル）。stocking と肌が z-fighting している箇所では、まず肌を
        stocking 表面まで引っ込めてから、さらにこの距離だけ内側に押し込みます。
        押し込むと肌の貫通はなくなりますが、水着の食い込み（タイトな演出）が再現できません。
        0 で無効化。デフォルト 0.001 (1mm)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: StockingSkinFalloffRadius
      label: 肌押込み フェード半径 (m)
      type: float
      default: 0.001
      range: [0, 0.01]
      description: |
        肌の押し込み量を、隣接 mesh（mesh_skin_upper 等）からの距離で線形フェードさせる半径（メートル）。
        距離 0 で押し込み 0、半径以上で 100%。境界での段差を防ぎます。0 で無効化（一様押し込み）。
        デフォルト 0.001 (1mm)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: StockingShapeFalloffRadius
      label: BlendShape フェード半径 (m)
      type: float
      default: 0.001
      range: [0, 0.01]
      description: |
        skin_stocking 系 blendShape (skin_stocking / skin_socks / skin_stocking_lower) の delta 自体を、
        隣接 mesh（mesh_skin_upper 等）からの距離で線形フェードさせる半径（メートル）。
        距離 0 で blendShape 効果 0、半径以上で 100%。境界（ウエスト等）の段差を解消します。
        0 で無効化（blendShape 効果は全頂点 100%）。デフォルト 0.001 (1mm)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: PantiesAltSlotMatch
      label: 水着・バニーガール衣装でも下着を表示
      type: bool
      default: true
      description: |
        ゲーム本体は通常衣装専用の panties slot にしか反応しないため、Mod 側で水着/バニー用スロットもフォールバック検出します。
        差し替え後の Material は通常衣装用テクスチャなので、UV 不一致で見た目が崩れる場合は OFF にしてください。
      ui:
        kind: toggle

    - name: PantiesAltSlotOverrideOnly
      label: Mod で下着を指定したキャストのみ適用 (OFF で全員)
      type: bool
      default: true
      description: |
        ON  : Mod で下着を明示選択したキャストのみフォールバックを適用。他キャストはバニラ挙動（水着/バニーで肌色）。
        OFF : 常時全キャストに適用。ゲーム本体由来の ReloadPanties でも水着/バニーに通常下着が出ます。
        PantiesAltSlotMatch=OFF のときはこの設定は無視されます。
      ui:
        kind: toggle

    - name: DisableStockings
      label: キャストのストッキング(パンスト)を非表示
      type: bool
      default: false
      ui:
        kind: toggle

- section: General
  name: 全般
  configs:
    - name: SteamLaunchCheck
      label: Steam 経由起動を強制
      type: bool
      default: true
      description: |
        Steam 外から直接起動された場合に Steam 経由で自動的に再起動します。
        デバッグ目的でゲームフォルダに steam_appid.txt（内容: 3443820）を置くとバイパスできます。

    - name: UIScale
      label: MOD UI スケール
      type: float
      default: 1.5
      range: [1.0, 2.0]
      description: |
        Mod 提供の UI（衣装変更 / 設定パネル / 出勤順 など）の表示倍率。ゲーム本体 UI には影響しません。
        変更はパネルを閉じて開き直すと反映されます。
      ui:
        kind: slider
        step: 0.1
        format: '{0:F1}x'

    - name: ContinueVoiceOnTap
      label: タップでボイスを継続
      type: bool
      default: false
      description: |
        会話送り（タップ／オート／スキップ）でボイスを途中停止しません。
        次の台詞のボイスで自然に上書きされるか、最後まで再生されます。
      ui:
        kind: toggle

    - name: ControllerTriggerDeadzone
      label: コントローラ ZL/ZR デッドゾーン
      type: float
      default: 0.35
      range: [0.05, 0.95]
      description: ZL/ZR を押下扱いにするしきい値。トリガーの遊びやドリフトがある場合に上げてください。
      ui:
        kind: slider
        step: 0.05
        format: '{0:F2}'

    - name: ControllerModifier
      label: コントローラ修飾ボタン
      type: enum
      enumType: BunnyGarden2FixMod.Utils.ControllerButton
      default: Select
      description: |
        ホットキーの同時押し用。ゲーム本来のコントローラー操作との競合回避に使用します。

    - name: ScreenshotScale
      label: スクリーンショット解像度倍率
      type: int
      default: 1
      range: [1, 8]
      description: 1 で通常のスクリーンショットと同じ解像度、2 で倍の解像度になります。
      ui:
        kind: slider
        step: 1
        format: '{0}x'

    - name: FastForwardSpeed
      label: 早送り倍率
      type: float
      default: 10
      range: [1, 240]
      description: FastForward ホットキー押下中の Time.timeScale 倍率。
      ui:
        kind: slider
        step: 1
        format: '{0:F0}x'

- section: HideUI
  name: UI 非表示設定
  header: |
    **F9** キーで設定パネルを開き、以下を ON/OFF できます。カーソルがパネル上にある間はマウスクリックや移動・視点操作などのゲーム入力はブロックされます。
  footer: |
    #### 操作方法（F9 パネル）

    | キー | 動作 |
    |------|------|
    | **F9** | パネルを開く / 閉じる |
    | **行をクリック / Space / Enter** | その行の設定をトグル |
    | **↑ / ↓** | 行を選択 |
    | **← / →** | スライダー値の増減 |
    | **Tab / 1〜9** | カテゴリ切替 |
    | **Esc** | パネルを閉じる |
  configs:
    - name: HideMoneyInSpecialScenes
      label: 旅行・特別シーンで所持金 UI を非表示
      key: HideInSpecialScenes
      type: bool
      default: true
      description: |
        対象シーン:
          - 旅行シーン
          - 恋愛に関する特別なシーン
      ui:
        kind: toggle

    - name: HideButtonGuide
      label: 画面下のボタンガイド(操作ヒント)を常時非表示
      type: bool
      default: false
      ui:
        kind: toggle

    - name: HideLikabilityGauge
      label: ラブカウンター(好感度ゲージ)を常時非表示
      type: bool
      default: false
      ui:
        kind: toggle

- section: Hotkey
  name: ホットキー
  configs:
    - name: FreeCamToggle
      label: フリーカメラ ON/OFF
      key: ToggleFreeCam
      type: hotkey
      defaultKey: F5
      defaultButton: Y
      controllerDescription: ControllerModifier と同時押しが必要です。
      ui:
        kind: keybinding

    - name: FixedFreeCamToggle
      label: 固定フリーカメラ ON/OFF
      key: ToggleFixedFreeCam
      type: hotkey
      defaultKey: F6
      defaultButton: X
      description: フリーカメラ起動中にカメラ位置を固定します。フリーカメラ起動中のみ有効。
      controllerDescription: ControllerModifier と同時押しが必要です。
      ui:
        kind: keybinding

    - name: OverlayToggle
      label: オーバーレイ表示切替
      key: ToggleOverlay
      type: hotkey
      defaultKey: F12
      defaultButton: Start
      description: フリーカメラの操作ガイドが対象です。
      controllerDescription: ControllerModifier と同時押しが必要です。
      ui:
        kind: keybinding

    - name: CaptureScreenshot
      label: スクリーンショット保存
      type: hotkey
      defaultKey: P
      defaultButton: A
      description: フリーカメラ中にゲーム UI・MOD オーバーレイを写さず BepInEx/screenshots フォルダへ PNG 出力します。
      controllerDescription: ControllerModifier と同時押しが必要です。
      ui:
        kind: keybinding

    - name: TimeStopToggle
      label: 時間停止 ON/OFF
      key: ToggleTimeStop
      type: hotkey
      defaultKey: T
      defaultButton: B
      description: フリーカメラ中の撮影構図決めなどに使用します。
      controllerDescription: ControllerModifier と同時押しが必要です。
      ui:
        kind: keybinding

    - name: FrameAdvance
      label: 1 フレーム送り
      type: hotkey
      defaultKey: F
      defaultButton: None
      description: 時間停止中のみ有効です。
      ui:
        kind: keybinding

    - name: FastForward
      label: 早送りホールド
      type: hotkey
      defaultKey: G
      defaultButton: None
      description: 押している間のみ有効。倍率は FastForwardSpeed で設定。
      ui:
        kind: keybinding

    - name: CostumeChangerShow
      label: 衣装変更 UI 表示
      key: Show
      type: hotkey
      defaultKey: F7
      defaultButton: None
      ui:
        kind: keybinding
