# Master declaration for all BepInEx Config entries used by FixMod.
# Source of truth — Generated/Configs.g.cs is built from this by tools/ConfigGen.
# Phase 1: section/key/default は既存 .cfg と完全一致を厳守する。
# upstream PR #25 (Refactor Plugin) で section/key が再編成されたため整合済み。
# label は必須・name 直下。生成コードの XML doc コメントと .cfg description の 1 行目に使われる。
# description は label の補足として書く（label と重複する見出し的記述は避ける）。
# type=hotkey は controllerDescription を任意指定でき、Gamepad エントリのみに追記される。

- section: Graphics
  configs:
    - name: Width
      label: 解像度幅
      type: int
      default: 1920
      description: 横方向のピクセル数。

    - name: Height
      label: 解像度高さ
      type: int
      default: 1080
      description: 縦方向のピクセル数。

    - name: ExtraWidth
      label: 拡張解像度幅
      type: int
      default: 2560
      description: |
        ゲーム内 OptionMenu の DISPLAY 項目に追加される追加解像度（ウィンドウモード）の幅。
        既定 2560（WQHD）。16:9 を推奨。

    - name: ExtraHeight
      label: 拡張解像度高さ
      type: int
      default: 1440
      description: |
        ゲーム内 OptionMenu の DISPLAY 項目に追加される追加解像度（ウィンドウモード）の高さ。
        既定 1440（WQHD）。16:9 を推奨。

    - name: FrameRate
      label: FPS 上限
      type: int
      default: 60
      range: [30, 240]
      description: -1 で上限を撤廃します。
      ui:
        kind: slider
        step: 1
        format: '{0} fps'

    - name: AntiAliasing
      label: アンチエイリアシング
      key: AntiAliasingType
      type: enum
      enumType: BunnyGarden2FixMod.AntiAliasingType
      default: MSAA8x
      description: |
        Off / FXAA / TAA / MSAA2x / MSAA4x / MSAA8x。
        右にいくほど画質が向上しますが動作が重くなります。

    - name: DisableChromaticAberration
      label: 色収差を無効化
      type: bool
      default: false
      description: 画面端のにじみエフェクトを無効化します。
      ui:
        kind: toggle

- section: Internal
  configs:
    - name: ExtraActive
      label: 拡張解像度の使用状態（内部）
      type: bool
      default: false
      description: |
        【内部状態】OptionMenu で拡張解像度 (ExtraWidth×ExtraHeight) を選択中かを記録します。
        ゲーム内オプション操作時に自動更新されます。手動変更しないでください。

- section: Camera
  configs:
    - name: Sensitivity
      label: 感度
      type: float
      default: 10
      range: [0.05, 30.0]
      description: フリーカメラのマウス感度。
      ui:
        kind: slider
        step: 0.05
        format: '{0:F2}'

    - name: Speed
      label: 移動速度
      type: float
      default: 2.5
      range: [0.5, 10.0]
      description: フリーカメラの基本移動速度。
      ui:
        kind: slider
        step: 0.1
        format: '{0:F2}'

    - name: FastSpeed
      label: 高速移動速度 (Shift)
      type: float
      default: 20
      range: [2.0, 60.0]
      description: Shift 押下中のフリーカメラ移動速度。
      ui:
        kind: slider
        step: 0.5
        format: '{0:F1}'

    - name: SlowSpeed
      label: 低速移動速度 (Ctrl)
      type: float
      default: 0.5
      range: [0.05, 2.0]
      description: Ctrl 押下中のフリーカメラ移動速度。
      ui:
        kind: slider
        step: 0.05
        format: '{0:F2}'

    - name: HideGameUiInFreeCam
      label: FreeCam 中に UI を非表示
      type: bool
      default: true
      description: フリーカメラ起動中はゲーム本体の Canvas を非表示にします。
      ui:
        kind: toggle

    - name: ControllerEnabled
      label: コントローラ操作を有効化
      type: bool
      default: true
      description: フリーカメラの操作にゲームパッド入力を使用できます。
      ui:
        kind: toggle

    - name: FreeCamToggle
      label: フリーカメラ ON/OFF
      key: ToggleFreeCam
      type: hotkey
      defaultKey: F5
      defaultButton: Y
      controllerDescription: ControllerModifier と同時押しが必要です。

    - name: FixedFreeCamToggle
      label: 固定フリーカメラ ON/OFF
      key: ToggleFixedFreeCam
      type: hotkey
      defaultKey: F6
      defaultButton: X
      description: |
        フリーカメラ起動中にカメラ位置を固定するモードを切り替えます。
        フリーカメラ起動中のみ有効。
      controllerDescription: ControllerModifier と同時押しが必要です。

- section: Animation
  configs:
    - name: MoreTalkReactions
      label: 会話リアクションを多様化
      type: bool
      default: false
      description: バーの背景キャスト 2 人の会話リアクションモーションを追加します。
      ui:
        kind: toggle
        category: Game

- section: Input
  configs:
    - name: ControllerTriggerDeadzone
      label: コントローラ ZL/ZR デッドゾーン
      type: float
      default: 0.35
      range: [0.05, 0.95]
      description: ZL/ZR を押下扱いにするしきい値。トリガーの遊びやドリフトがある場合に上げてください。
      ui:
        kind: slider
        step: 0.05
        format: '{0:F2}'

    - name: ControllerModifier
      label: コントローラ修飾ボタン
      type: enum
      enumType: BunnyGarden2FixMod.Utils.ControllerButton
      default: Select
      description: |
        ホットキーの同時押し用。ゲーム本来のコントローラー操作との競合回避に使用します。

- section: Appearance
  configs:
    - name: DisableStockings
      label: パンストを無効化
      type: bool
      default: false
      description: キャストのストッキングを非表示にします。
      ui:
        kind: toggle
        category: CostumeChanger

- section: Conversation
  configs:
    - name: ContinueVoiceOnTap
      label: タップでボイスを継続
      type: bool
      default: false
      description: |
        会話送り（タップ／オート／スキップ）でボイスを途中停止しません。
        次の台詞のボイスで自然に上書きされるか、最後まで再生されます。
      ui:
        kind: toggle
        category: Game

- section: Cheki
  configs:
    - name: ChekiHighResEnabled
      label: 高解像度チェキを有効化
      key: HighResEnabled
      type: bool
      default: false
      description: |
        チェキ（撮影写真）の保存解像度を Size で指定した値に変更します。false で本体既定（320x320）。
        互換性: 本体セーブには常に 320x320 版が保存されるため、MOD を外しても主セーブは破損しません。
        高解像度版は MOD 独自のサイドカーファイル（主セーブ + .exmod）に格納します。
        スロット対応: セーブスロット単位で高解像度データを分離管理します。
        副作用: 高解像度化でメモリ／セーブサイズが増加します（1024 時: 約 48MB/12 枚）。
      ui:
        kind: toggle

    - name: ChekiSize
      label: チェキ解像度
      key: Size
      type: int
      default: 1024
      range: [64, 2048]
      description: |
        正方形サイズ（ピクセル）。HighResEnabled が false の場合は無視されます（本体既定の 320 が使用されます）。
        PNG で実測 1〜5MB/枚 程度に収まります。
      ui:
        kind: slider
        step: 64
        format: '{0} px'

    - name: ChekiFormat
      label: チェキ画像フォーマット
      key: ImageFormat
      type: enum
      enumType: BunnyGarden2FixMod.ChekiImageFormat
      default: PNG
      description: |
        ExSave に格納する画像フォーマット。
          PNG : 無劣化圧縮。サイズ 1/5〜1/20・エンコード 50〜200ms/枚。既定。
          JPG : 劣化圧縮。サイズ 1/20〜1/50・エンコード 30〜100ms/枚。
        エンコードはシャッター時に 1 度のみ走ります。読み込みは magic byte による自動判別です。

    - name: ChekiJpgQuality
      label: JPG 品質
      key: JpgQuality
      type: int
      default: 90
      range: [1, 100]
      description: ImageFormat=JPG のときの品質（1〜100）。値が小さいほどサイズは小さく画質は粗くなります。
      ui:
        kind: slider
        step: 1
        format: '{0}'

- section: Ending
  configs:
    - name: EndingChekiSlideshow
      label: エンディングでチェキスライドショー
      key: ChekiSlideshow
      type: bool
      default: true
      description: エンディング中に撮影済みのチェキをスライドショー表示します。
      ui:
        kind: toggle
        category: Cheki

- section: Cheat
  configs:
    - name: CastOrder
      label: キャスト出勤順序変更
      type: bool
      default: false
      description: |
        バーに入る前にキャストの出勤順序を変更できます。
        F1 キーで編集モードを開始し、数字キー（1〜5）でキャストを選択・入れ替えます。
      ui:
        kind: toggle

    - name: UltimateSurvivorEnabled
      label: 鉄骨渡り無敗（チート）
      key: UltimateSurvivor
      type: bool
      default: false
      description: 鉄骨渡りミニゲームで落下しなくなります。
      ui:
        kind: toggle

    - name: GambleAlwaysWinEnabled
      label: ギャンブル無敗（チート）
      key: GambleAlwaysWin
      type: bool
      default: false
      description: ギャンブルで負けなくなります。
      ui:
        kind: toggle

    - name: CheatLikability
      label: 好感度ヒント表示
      key: Likability
      type: bool
      default: false
      description: |
        会話選択肢・ドリンク・フードの正解をゲーム内に表示します。
        【会話選択肢】選択肢テキストの先頭に記号が追加されます。
          ★ : 好感度UP（正解）
          ▼ : 好感度DOWN（酔い選択肢だが現在の状況では効果なし）
        【ドリンク・フード】アイテムの背景色が変化します。
          緑 : キャストのお気に入り（AddFavoriteLikability > 0）
          黄 : 今日の旬アイテム（ボーナスあり）
          赤 : キャストが嫌いなもの（AddFavoriteLikability < 0）
      ui:
        kind: toggle

- section: CostumeChanger
  configs:
    - name: CostumeChangerEnabled
      label: 衣装変更を有効化（要再起動）
      key: Enabled
      type: bool
      default: true
      description: |
        衣装変更 UI とパッチを有効化します。
        OFF→ON でパッチ適用が必要なため、変更は再起動後に反映されます。
      ui:
        kind: toggle

    - name: RespectGameCostumeOverride
      label: ゲーム指定衣装を優先
      type: bool
      default: true
      description: |
        試着室などゲームが特定の衣装を強制するシーンでは MOD 側の衣装変更を一時停止します。
        ゲーム内のイベントと衣装の競合を防げます。
      ui:
        kind: toggle

    - name: SwimWearStocking
      label: 水着+ストッキング適用
      type: bool
      default: true
      description: |
        水着コスチューム着用中にストッキングを適用できるようにします。
        水着モデルには本来ストッキング用ブレンドシェイプがないため、同キャラの Uniform コスチュームからデータを移植します。

    - name: StockingOffset
      label: ストッキング 押出し量 (m)
      type: float
      default: 0
      range: [0, 0.01]
      description: |
        水着+ストッキング適用時、stocking 頂点を肌より外側へ保つ最小距離（メートル）。
        押し出すと水着の食い込み（タイトな演出）が再現できますが、stocking が水着を貫通します。
        0 で無効化。デフォルト 0 (無効)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: StockingSkinShrink
      label: 肌 押込み量 (m)
      type: float
      default: 0.001
      range: [0, 0.01]
      description: |
        水着+ストッキング適用時、肌（mesh_skin_lower）の頂点を「stocking 押し出し後表面より内側」に
        保つ目標距離（メートル）。stocking と肌が z-fighting している箇所では、まず肌を
        stocking 表面まで引っ込めてから、さらにこの距離だけ内側に押し込みます。
        押し込むと肌の貫通はなくなりますが、水着の食い込み（タイトな演出）が再現できません。
        0 で無効化。デフォルト 0.001 (1mm)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: StockingSkinFalloffRadius
      label: 肌押込み フェード半径 (m)
      type: float
      default: 0.001
      range: [0, 0.01]
      description: |
        肌の押し込み量を、隣接 mesh（mesh_skin_upper 等）からの距離で線形フェードさせる半径（メートル）。
        距離 0 で押し込み 0、半径以上で 100%。境界での段差を防ぎます。0 で無効化（一様押し込み）。
        デフォルト 0.001 (1mm)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: StockingShapeFalloffRadius
      label: BlendShape フェード半径 (m)
      type: float
      default: 0.001
      range: [0, 0.01]
      description: |
        skin_stocking 系 blendShape (skin_stocking / skin_socks / skin_stocking_lower) の delta 自体を、
        隣接 mesh（mesh_skin_upper 等）からの距離で線形フェードさせる半径（メートル）。
        距離 0 で blendShape 効果 0、半径以上で 100%。境界（ウエスト等）の段差を解消します。
        0 で無効化（blendShape 効果は全頂点 100%）。デフォルト 0.001 (1mm)。
      ui:
        kind: slider
        step: 0.0001
        format: '{0:F4}'

    - name: CostumeChangerShow
      label: 衣装変更 UI 表示
      key: Show
      type: hotkey
      defaultKey: F7
      description: 衣装変更 UI のトグル。

- section: General
  configs:
    - name: SteamLaunchCheck
      label: Steam 経由起動を強制
      type: bool
      default: true
      description: |
        Steam 外から直接起動された場合に Steam 経由で自動的に再起動します。
        デバッグ目的でゲームフォルダに steam_appid.txt（内容: 3443820）を置くとバイパスできます。

    - name: OverlayToggle
      label: オーバーレイ表示切替
      key: ToggleOverlay
      type: hotkey
      defaultKey: F12
      defaultButton: Start
      description: フリーカメラの操作ガイドオーバーレイの表示/非表示を切り替えます。
      controllerDescription: ControllerModifier と同時押しが必要です。

    - name: CaptureScreenshot
      label: スクリーンショット保存
      type: hotkey
      defaultKey: P
      defaultButton: A
      description: フリーカメラ中にゲーム UI・MOD オーバーレイを写さず BepInEx/screenshots フォルダへ PNG 保存します。
      controllerDescription: ControllerModifier と同時押しが必要です。

- section: HideUI
  configs:
    - name: HideUIEnabled
      label: F9 設定パネルを有効化
      key: Enabled
      type: bool
      default: true
      description: F9 キーで一部 UI を非表示にできる設定パネルが開きます。

    - name: HideMoneyInSpecialScenes
      label: 旅行・特別シーンで所持金を非表示
      key: HideInSpecialScenes
      type: bool
      default: true
      description: |
        旅行シーンおよび特別なシーンで雰囲気を損なう所持金 UI を非表示にします。
        F9 パネルまたはこのコンフィグで ON/OFF できます。
      ui:
        kind: toggle

    - name: HideButtonGuide
      label: ボタンガイドを常時非表示
      type: bool
      default: false
      description: |
        画面下のボタンガイド（操作ヒント）を常時非表示にします。
        F9 パネルまたはこのコンフィグで ON/OFF できます。
      ui:
        kind: toggle

    - name: HideLikabilityGauge
      label: 好感度ゲージを非表示
      type: bool
      default: false
      description: |
        ラブカウンター（好感度ゲージ）を常時非表示にします。
        F9 パネルまたはこのコンフィグで ON/OFF できます。
      ui:
        kind: toggle

- section: Time
  configs:
    - name: FastForwardSpeed
      label: 早送り倍率
      type: float
      default: 10
      range: [1, 240]
      description: FastForward ホットキー押下中の Time.timeScale 倍率。
      ui:
        kind: slider
        step: 1
        format: '{0:F0}x'
        category: Game

    - name: TimeStopToggle
      label: 時間停止 ON/OFF
      key: ToggleTimeStop
      type: hotkey
      defaultKey: T
      defaultButton: B
      description: フリーカメラ中の撮影構図決めなどに使用します。
      controllerDescription: ControllerModifier と同時押しが必要です。

    - name: FrameAdvance
      label: 1 フレーム送り
      type: hotkey
      defaultKey: F
      description: 時間停止中のみ有効です。

    - name: FastForward
      label: 早送りホールド
      type: hotkey
      defaultKey: G
      description: 押している間のみ時間を早送りします。倍率は FastForwardSpeed で設定できます。
